<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKN Jugosławia - Logowanie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Styl pozostaje bez zmian, taki sam jak w poprzednim kroku */
        :root { --yu-blue: #003893; --yu-red: #DE0000; --yu-yellow: #FCD116; --bg-dark: #121212; --text-light: #f5f5f5; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-dark); color: var(--text-light); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #1e1e1e; padding: 2.5rem 2rem; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; width: 100%; max-width: 350px; position: relative; overflow: hidden; border: 1px solid #333; }
        .flag-header { position: absolute; top: 0; left: 0; width: 100%; height: 15px; display: flex; flex-direction: column; }
        .flag-stripe { height: 5px; width: 100%; }
        .stripe-blue { background-color: var(--yu-blue); } .stripe-white { background-color: #ffffff; } .stripe-red { background-color: var(--yu-red); }
        .star { color: var(--yu-red); text-shadow: -1px -1px 0 var(--yu-yellow), 1px -1px 0 var(--yu-yellow), -1px 1px 0 var(--yu-yellow), 1px 1px 0 var(--yu-yellow); font-size: 2.5rem; line-height: 1; margin-bottom: 10px; }
        h1 { margin: 0 0 5px 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        form { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #444; background: #2a2a2a; color: #fff; border-radius: 2px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--yu-blue); }
        button { margin-top: 10px; padding: 14px; border: none; background-color: var(--yu-red); color: white; border-radius: 2px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: background 0.2s; font-size: 0.9rem; }
        button:hover { background-color: #a30000; }
        #message { margin-top: 15px; font-size: 0.9rem; color: #ff5555; }
    </style>
</head>
<body>

    <div class="container">
        <div class="flag-header">
            <div class="flag-stripe stripe-blue"></div>
            <div class="flag-stripe stripe-white"></div>
            <div class="flag-stripe stripe-red"></div>
        </div>
        
        <div class="star">★</div>
        <h1>SKN Jugosławia</h1>
        <p>Autoryzacja Danych</p>

        <form id="login-form">
            <div>
                <label for="email">E-mail (Identyfikator)</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div>
                <label for="password">Hasło dostępu</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" id="submit-btn">Zaloguj do systemu</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        // 1. Inicjalizacja połączenia
        const supabaseUrl = 'https://pswpuernfyfsijnscnwt.supabase.co/rest/v1/';
        const supabaseKey = 'sb_publishable_XUyqOs0SmAK4tezMYjdBDg_7l5S6bbb';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Przechwytywanie kliknięcia "Zaloguj"
        document.getElementById('login-form').addEventListener('submit', async function(event) {
            event.preventDefault(); // Zatrzymuje przeładowanie strony
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');
            const btn = document.getElementById('submit-btn');

            btn.innerText = "Logowanie...";
            messageEl.innerText = "";
            messageEl.style.color = "#ff5555"; // Kolor na błędy

            // 3. Wysłanie zapytania do Supabase
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                // Jeśli coś pójdzie nie tak (złe hasło, brak konta)
                messageEl.innerText = "Błąd: " + error.message;
                btn.innerText = "Zaloguj do systemu";
            } else {
                // Sukces!
                messageEl.style.color = "#55ff55"; // Kolor zielony
                messageEl.innerText = "Zalogowano pomyślnie!";
                
                // Tutaj później dodamy kod przenoszący do ekranu gry
                // np. window.location.href = "gra.html";
            }
        });
    </script>

</body>
</html>
