<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKN Jugosławia - Logowanie</title>

    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/login.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-page">
    <audio id="ambient-audio" loop preload="auto">
        <source src="theme.ogg" type="audio/ogg">
    </audio>

    <button id="audio-toggle" title="Włącz/Wyłącz muzykę">Audio</button>

    <div class="login-container">
        <div class="flag-header">
            <div class="flag-stripe stripe-blue"></div>
            <div class="flag-stripe stripe-white"></div>
            <div class="flag-stripe stripe-red"></div>
        </div>

        <div class="star large">★</div>
        <h1>SKN Jugosławia</h1>
        <p>Autoryzacja Danych</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail (Identyfikator)</label>
                <input
                    type="email"
                    id="email"
                    placeholder="user@example.com"
                    required
                    autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Hasło dostępu</label>
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password">
            </div>

            <button type="submit" id="submit-btn" class="btn-primary login-form-submit">
                Zaloguj do systemu
            </button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        /**
         * ============================================================================
         * LOGIN PAGE LOGIC
         * ============================================================================
         * * Functions:
         * - Initialize Supabase
         * - Login form handling
         * - Mute/unmute music
         * - Session verification
         */

        // ========== SUPABASE CONFIGURATION ==========
        // TODO: These values can be found in Supabase Dashboard > Settings > API
        const SUPABASE_URL = 'https://pswpuernfyfsijnscnwt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XUyqOs0SmAK4tezMYjdBDg_7l5S6bbb';

        // Create Supabase client
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const auth = new AuthManager(supabaseClient);

        // ========== DOM ELEMENTS ==========
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const messageEl = document.getElementById('message');
        const bgAudio = document.getElementById('ambient-audio');
        const audioToggle = document.getElementById('audio-toggle');

        // ========== LOGIN FORM HANDLING ==========
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validation
            if (!email || !password) {
                showMessage('Wypełnij wszystkie pola!', 'error');
                return;
            }

            // Display loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Logowanie...';
            hideMessage();

            // Attempt to log in
            const { user, error } = await auth.login(email, password);

            if (error) {
                // Login error
                showMessage(`${error.message}`, 'error');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Zaloguj do systemu';
                return;
            }

            // Login successful
            showMessage('Zalogowano pomyślnie! Przechodzę do gry...', 'success');
            submitBtn.innerText = 'Wchodzę do gry...';

            // Wait 1 second and redirect
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });

        // ========== MUSIC HANDLING ==========
        /**
         * Set music volume to low
         */
        bgAudio.volume = 0.15;

        /**
         * Toggle button to mute/unmute music
         */
        audioToggle.addEventListener('click', () => {
            if (bgAudio.paused) {
                bgAudio.play();
                audioToggle.classList.remove('muted');
                audioToggle.textContent = 'ON';
            } else {
                bgAudio.pause();
                audioToggle.classList.add('muted');
                audioToggle.textContent = 'OFF';
            }
        });

        /**
         * Start music when user clicks anywhere on the page
         * (due to browser autoplay policies)
         */
        document.body.addEventListener('click', () => {
            if (bgAudio.paused) {
                bgAudio.play();
            }
        }, { once: true });

        // ========== UTILITY FUNCTIONS ==========
        /**
         * Display message (error/success/info)
         * @param {string} text - Message content
         * @param {string} type - Type: 'error', 'success', 'info'
         */
        function showMessage(text, type = 'info') {
            messageEl.innerText = text;
            messageEl.className = `message show ${type}`;
        }

        /**
         * Hide message
         */
        function hideMessage() {
            messageEl.classList.remove('show');
        }

        // ========== PAGE LOAD ==========
        /**
         * Check if user is already logged in
         * If yes - redirect to dashboard
         */
        window.addEventListener('DOMContentLoaded', async () => {
            console.log('Login page loaded');
            const { user, error } = await auth.checkSession();
            if (user) {
                console.log('User already logged in, redirecting...');
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
